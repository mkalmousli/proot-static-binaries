name: build-and-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .Cache
          key: ${{ runner.os }}-proot-cache-${{ matrix.arch }}-${{ hashFiles('scripts/build_static.py') }}
          restore-keys: |
            ${{ runner.os }}-proot-cache-${{ matrix.arch }}-
            ${{ runner.os }}-proot-cache-

      - name: Build static proot
        env:
          PROOT_REF: master
        run: python3 scripts/build_static.py --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}
          path: dist/proot-${{ matrix.arch }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        run: |
          mkdir -p dist
          cp release-assets/proot-x86_64/proot-x86_64 dist/
          cp release-assets/proot-aarch64/proot-aarch64 dist/
          cp release-assets/proot-armv7/proot-armv7 dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/proot-x86_64
            dist/proot-aarch64
            dist/proot-armv7
