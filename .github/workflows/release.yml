name: Build and Release

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master
    paths:
      - 'build.py'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if no updates found'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      proot_commit: ${{ steps.check.outputs.proot_commit }}
      qemu_commit: ${{ steps.check.outputs.qemu_commit }}
      next_version: ${{ steps.check.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for updates
        id: check
        shell: bash
        run: |
          set -e
          # Resolve current HEADs
          PROOT_COMMIT=$(git ls-remote https://github.com/proot-me/proot.git HEAD | cut -f1)
          QEMU_COMMIT=$(git ls-remote https://github.com/qemu/qemu.git HEAD | cut -f1)
          
          echo "Current proot commit: $PROOT_COMMIT"
          echo "Current qemu commit: $QEMU_COMMIT"
          
          # Get latest release info
          # If no releases exist, NEXT_VERSION will be 1
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest)
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name // "v0"')
          LATEST_BODY=$(echo "$LATEST_RELEASE" | jq -r '.body // ""')
          
          # Extract version number (handles both vN and N)
          VERSION_NUM=$(echo "${LATEST_TAG#v}" | grep -E '^[0-9]+$' || echo "0")
          NEXT_VERSION=$((VERSION_NUM + 1))
          
          SHOULD_BUILD="true"
          # Only skip on scheduled runs if no updates are found
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.inputs.force }}" != "true" ]]; then
            if [[ "$LATEST_BODY" == *"$PROOT_COMMIT"* ]] && [[ "$LATEST_BODY" == *"$QEMU_COMMIT"* ]]; then
              echo "No updates found in proot or qemu since last release ($LATEST_TAG)."
              SHOULD_BUILD="false"
            fi
          fi
          
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "proot_commit=$PROOT_COMMIT" >> $GITHUB_OUTPUT
          echo "qemu_commit=$QEMU_COMMIT" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7]
        libc: [musl, gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make \
            file \
            pkg-config \
            git \
            ninja-build \
            meson \
            bison \
            flex \
            libglib2.0-dev \
            libpixman-1-dev \
            zlib1g-dev

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .Cache
          key: ${{ runner.os }}-proot-cache-${{ matrix.arch }}-${{ matrix.libc }}-${{ hashFiles('build.py') }}
          restore-keys: |
            ${{ runner.os }}-proot-cache-${{ matrix.arch }}-${{ matrix.libc }}-

      - name: Build static proot
        env:
          PROOT_COMMIT: ${{ needs.check-updates.outputs.proot_commit }}
          QEMU_COMMIT: ${{ needs.check-updates.outputs.qemu_commit }}
        run: |
          LIBC_FLAG="--${{ matrix.libc }}"
          python3 build.py --arch ${{ matrix.arch }} $LIBC_FLAG --parallel 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}-${{ matrix.libc }}
          path: dist/proot-${{ matrix.arch }}-${{ matrix.libc }}

  release:
    needs: [check-updates, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: proot-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-updates.outputs.next_version }}
          name: Release v${{ needs.check-updates.outputs.next_version }}
          body: |
            Automated build of static proot binaries.
            
            **Components:**
            - proot: ${{ needs.check-updates.outputs.proot_commit }}
            - qemu: ${{ needs.check-updates.outputs.qemu_commit }}
            - Build Date: $(date -u +'%Y-%m-%d %H:%M:%S' UTC)
          files: release-assets/*
