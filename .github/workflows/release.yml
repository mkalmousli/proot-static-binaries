name: Build and Release

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master
    paths:
      - 'build.py'
      - '.github/workflows/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  QEMU_VERSION: v9.2.2

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      proot_tag: ${{ steps.check.outputs.proot_tag }}
      proot_commit: ${{ steps.check.outputs.proot_commit }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for updates
        id: check
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_TAGS=$(git ls-remote --tags --refs https://github.com/proot-me/proot.git | awk '{print $2}' | sed 's#refs/tags/##' | grep '^v[5-9]' | sort -V)
          LATEST_RELEASE=$(curl -fsS https://api.github.com/repos/${{ github.repository }}/releases/latest || true)
          LATEST_BODY=$(echo "$LATEST_RELEASE" | jq -r '.body // ""' 2>/dev/null || echo "")
          LATEST_PROOT_TAG=$(printf '%s\n' "$LATEST_BODY" | awk -F': ' '/^proot tag: /{print $2; exit}')

          NEXT_TAG=""
          LATEST_UPSTREAM=$(printf '%s\n' "$UPSTREAM_TAGS" | tail -n1)

          if [[ -n "$LATEST_PROOT_TAG" ]]; then
            if [[ "$LATEST_PROOT_TAG" == "$LATEST_UPSTREAM" ]]; then
              echo "Already at the latest tag: $LATEST_UPSTREAM"
            else
              seen_current="false"
              while IFS= read -r tag; do
                [[ -z "$tag" ]] && continue
                if [[ "$seen_current" == "true" ]]; then
                  NEXT_TAG="$tag"
                  break
                fi
                if [[ "$tag" == "$LATEST_PROOT_TAG" ]]; then
                  seen_current="true"
                fi
              done <<< "$UPSTREAM_TAGS"
              
              if [[ "$seen_current" == "false" ]]; then
                echo "Current tag $LATEST_PROOT_TAG not found in filtered upstream; defaulting to latest $LATEST_UPSTREAM"
                NEXT_TAG="$LATEST_UPSTREAM"
              fi
            fi
          else
            echo "No previous release tag found; starting with latest $LATEST_UPSTREAM"
            NEXT_TAG="$LATEST_UPSTREAM"
          fi

          SHOULD_BUILD="true"
          if [[ -z "$NEXT_TAG" ]]; then
            echo "No new proot tag detected; skipping build."
            SHOULD_BUILD="false"
          fi

          PROOT_COMMIT=""
          if [[ -n "$NEXT_TAG" ]]; then
            PROOT_COMMIT=$(git ls-remote https://github.com/proot-me/proot.git "refs/tags/${NEXT_TAG}^{}" | cut -f1 || true)
            if [[ -z "$PROOT_COMMIT" ]]; then
              PROOT_COMMIT=$(git ls-remote https://github.com/proot-me/proot.git "refs/tags/${NEXT_TAG}" | cut -f1 || true)
            fi
          fi

          echo "proot_tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "proot_commit=$PROOT_COMMIT" >> $GITHUB_OUTPUT
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

  build:
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7]
        libc: [musl, gnu]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .Cache
          key: ${{ runner.os }}-proot-cache-${{ matrix.arch }}-${{ matrix.libc }}-${{ env.QEMU_VERSION }}-${{ hashFiles('build.py') }}
          restore-keys: |
            ${{ runner.os }}-proot-cache-${{ matrix.arch }}-${{ matrix.libc }}-${{ env.QEMU_VERSION }}-
      - name: Build static proot
        env:
          PROOT_TAG: ${{ needs.check-updates.outputs.proot_tag }}
          PROOT_COMMIT: ${{ needs.check-updates.outputs.proot_commit }}
          QEMU_COMMIT: ${{ env.QEMU_VERSION }}
        run: |
          python3 build.py --arch ${{ matrix.arch }} --${{ matrix.libc }} --parallel 1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}-${{ matrix.libc }}
          path: dist/proot-${{ matrix.arch }}-${{ matrix.libc }}

  release:
    needs: [check-updates, build]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: proot-*
          merge-multiple: true
      - name: Capture build date
        id: meta
        shell: bash
        run: echo "build_date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
      - name: Build info manifest
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.check-updates.outputs.proot_tag }}
          PROOT_TAG: ${{ needs.check-updates.outputs.proot_tag }}
          PROOT_COMMIT: ${{ needs.check-updates.outputs.proot_commit }}
          QEMU_VERSION: ${{ env.QEMU_VERSION }}
          PROJECT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          release_dir = Path("release-assets")
          artifacts = []
          for path in sorted(release_dir.glob("proot-*")):
              if not path.is_file():
                  continue
              parts = path.name.split("-", 2)
              if len(parts) != 3:
                  continue
              arch = parts[1]
              libc = parts[2]
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              artifacts.append({
                  "name": path.name,
                  "arch": arch,
                  "libc": libc,
                  "size": path.stat().st_size,
                  "sha256": digest,
              })

          info = {
              "repository": os.environ["REPOSITORY"],
              "tag": os.environ["RELEASE_TAG"],
              "proot_tag": os.environ["PROOT_TAG"],
              "proot_commit": os.environ["PROOT_COMMIT"],
              "qemu_version": os.environ["QEMU_VERSION"],
              "project_commit": os.environ["PROJECT_COMMIT"],
              "build_date": os.environ["BUILD_DATE"],
              "generated_at": os.environ["BUILD_DATE"],
              "artifacts": artifacts,
          }

          (release_dir / "info.json").write_text(json.dumps(info, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-updates.outputs.proot_tag }}
          name: Release ${{ needs.check-updates.outputs.proot_tag }}
          body: |
            Automated build of static proot binaries.

            proot tag: ${{ needs.check-updates.outputs.proot_tag }}
            proot commit: ${{ needs.check-updates.outputs.proot_commit }}
            qemu version: ${{ env.QEMU_VERSION }}
            project commit: ${{ github.sha }}
            Build Date: ${{ steps.meta.outputs.build_date }}
          files: release-assets/*

  site:
    needs: [check-updates, release]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'release' ||
       (needs.check-updates.outputs.should_build == 'true' && needs.release.result == 'success'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 build_site.py
      - name: Publish site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./.site-build
